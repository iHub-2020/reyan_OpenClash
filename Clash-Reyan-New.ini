custom_proxy_group=✈️ Telegram`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]CF-1-故转`[]CF-2-故转`[]CF-3-故转`[]CF-4-故转`[]CF-5-故转`[]其他-故转`[]直连`[]拒绝
