;==============================
; Clash-Reyan-New.ini 转换模板（修复版 v2）
; 修复内容：
;   1. 新增 Google 专属规则集和策略组，默认出口美国，解决 google.com.hk 问题
;   2. 新增 拒绝 规则集触发入口（广告拦截）
;   3. 将 🌏 Globe 重命名为 🌍 境外，避免与 Clash 内置 GLOBAL 混淆
;   4. IPTV 策略组默认改为直连
;   5. 台湾正则移除错误的 🇨🇳
;   6. 所有地区节点正则新增 (?i) 大小写不敏感 + (?!.*直连) 排除已失效直连节点
;==============================

;==============================
; 规则集定义（ruleset）
; 注意：规则按顺序匹配，越靠前优先级越高
;==============================

; 广告拦截 —— 放最前，命中即拒绝
ruleset=拒绝,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AdvertisingLite/AdvertisingLite.list

; 业务分流
ruleset=🤖 AI,https://raw.githubusercontent.com/iHub-2020/reyan_OpenClash/refs/heads/main/AI.list
ruleset=💻 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GitHub/GitHub.list
ruleset=🐳 Docker,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Docker/Docker.list
ruleset=✈️ Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list
ruleset=💬 WhatsApp,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Whatsapp/Whatsapp.list
ruleset=📹 Youtube,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list

; Google 专属规则集 —— 放在 Globe/境外 之前，确保 Google 优先命中此组
ruleset=🔍 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list

ruleset=📺 IPTV,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/IPTV/IPTV.list
ruleset=🚀 代理,https://raw.githubusercontent.com/iHub-2020/reyan_OpenClash/refs/heads/main/Proxy.list
ruleset=🌍 境外,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Global/Global.list
ruleset=🏠 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Direct/Direct.list
ruleset=🏠 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/China/China.list
ruleset=🏠 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaIPs/ChinaIPs.list
ruleset=🏠 国内,[]GEOIP,CN
ruleset=➡️ 其他,[]MATCH

;==============================
; 策略组定义（custom_proxy_group）
;==============================

;--- 业务分流组 ---

; Google 专属组 —— 默认走美国，解决 google.com.hk 问题
custom_proxy_group=🔍 Google`select`[]美国-故转`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝

custom_proxy_group=🤖 AI`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝
custom_proxy_group=💻 GitHub`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝
custom_proxy_group=🐳 Docker`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝
custom_proxy_group=✈️ Telegram`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝
custom_proxy_group=💬 WhatsApp`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝
custom_proxy_group=📹 Youtube`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝

; IPTV 默认直连（国内流媒体，不应走代理）
custom_proxy_group=📺 IPTV`select`[]直连`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]拒绝

custom_proxy_group=🚀 代理`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝
custom_proxy_group=🌍 境外`select`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]直连`[]拒绝

;--- 国内/其他策略 ---
custom_proxy_group=🏠 国内`select`[]直连
custom_proxy_group=➡️ 其他`select`[]其他-故转`[]直连

;--- 总策略组（排除自建节点、直连节点、拒绝）
custom_proxy_group=所有-手动`select`(?i)^((?!(直连|拒绝|racknerd|oracle)).)* $
custom_proxy_group=所有-自动`url-test`(?i)^((?!(直连|拒绝|racknerd|oracle)).)* $`http://www.gstatic.com/generate_204`300,,50

;--- 香港节点组（排除失效直连节点）---
custom_proxy_group=香港-故转`fallback`[]香港-手动`[]香港-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=香港-手动`select`(?i)(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong))(?!.*直连).*$
custom_proxy_group=香港-自动`url-test`(?i)(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong))(?!.*直连).*$`http://www.gstatic.com/generate_204`300,,50

;--- 台湾节点组（移除错误的 🇨🇳，排除失效直连节点）---
custom_proxy_group=台湾-故转`fallback`[]台湾-手动`[]台湾-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=台湾-手动`select`(?i)(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan))(?!.*直连).*$
custom_proxy_group=台湾-自动`url-test`(?i)(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan))(?!.*直连).*$`http://www.gstatic.com/generate_204`300,,50

;--- 日本节点组（排除失效直连节点）---
custom_proxy_group=日本-故转`fallback`[]日本-手动`[]日本-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=日本-手动`select`(?i)(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan))(?!.*直连).*$
custom_proxy_group=日本-自动`url-test`(?i)(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan))(?!.*直连).*$`http://www.gstatic.com/generate_204`300,,50

;--- 新加坡节点组（排除失效直连节点）---
custom_proxy_group=新加坡-故转`fallback`[]新加坡-手动`[]新加坡-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=新加坡-手动`select`(?i)(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore))(?!.*直连).*$
custom_proxy_group=新加坡-自动`url-test`(?i)(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore))(?!.*直连).*$`http://www.gstatic.com/generate_204`300,,50

;--- 美国节点组（排除失效直连节点）---
custom_proxy_group=美国-故转`fallback`[]美国-手动`[]美国-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=美国-手动`select`(?i)(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States))(?!.*直连).*$
custom_proxy_group=美国-自动`url-test`(?i)(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States))(?!.*直连).*$`http://www.gstatic.com/generate_204`300,,50

;--- 自建美国节点组 ---
custom_proxy_group=自建美国-故转`fallback`[]自建美国-手动`[]自建美国-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=自建美国-手动`select`(?i).*racknerd.*
custom_proxy_group=自建美国-自动`url-test`(?i).*racknerd.*`http://www.gstatic.com/generate_204`300,,50

;--- 自建日本1节点组 ---
custom_proxy_group=自建日本1-故转`fallback`[]自建日本1-手动`[]自建日本1-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=自建日本1-手动`select`(?i).*oracle1.*
custom_proxy_group=自建日本1-自动`url-test`(?i).*oracle1.*`http://www.gstatic.com/generate_204`300,,50

;--- 自建日本2节点组 ---
custom_proxy_group=自建日本2-故转`fallback`[]自建日本2-手动`[]自建日本2-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=自建日本2-手动`select`(?i).*oracle2.*
custom_proxy_group=自建日本2-自动`url-test`(?i).*oracle2.*`http://www.gstatic.com/generate_204`300,,50

;--- 其他地区节点组 ---
custom_proxy_group=其他-故转`fallback`[]其他-手动`[]其他-自动`http://www.gstatic.com/generate_204`300
custom_proxy_group=其他-手动`select`(?i)^((?!(直连|拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|racknerd|oracle)).)*$
custom_proxy_group=其他-自动`url-test`(?i)^((?!(直连|拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|racknerd|oracle)).)*$`http://www.gstatic.com/generate_204`300,,50

;--- 特殊节点 ---
custom_proxy_group=直连`select`[]DIRECT
custom_proxy_group=拒绝`select`[]REJECT

;==============================
; 订阅转换参数
;==============================
enable_rule_generator=true
overwrite_original_rules=true
