;==============================
; Clash-Reyan-New.ini 转换模板（修复版 v4）
; 原有修复内容（v3）：
;   1. [BUG FIX] 所有-手动/所有-自动 正则末尾多余空格已移除
;   2. [BUG FIX] 全部 XX-故转 由 fallback 改为 select
;   3. 新增 Google 专属规则集和策略组，默认出口美国
;   4. 新增 拒绝 规则集触发入口（广告拦截）
;   5. 将 🌏 Globe 重命名为 🌍 境外
;   6. IPTV 策略组默认改为直连
;   7. 台湾正则移除错误的 🇨🇳
;   8. 所有地区节点正则新增 (?i) + (?!.*直连)
; v4 新增内容：
;   9. [NEW] CF官方优选1-50 按数字分5组（CF-1 ~ CF-5）
;      CF-1：CF官方优选1~10
;      CF-2：CF官方优选11~20
;      CF-3：CF官方优选21~30
;      CF-4：CF官方优选31~40
;      CF-5：CF官方优选41~50
;      每组含 故转/手动/自动 三层结构
;      CF节点保留在 所有-手动/所有-自动，已从 其他 组排除
;      正则用 (?!\d) 防止数字串越界（优选1不误匹配优选10）
;==============================

;==============================
; 规则集定义（ruleset）
; 注意：规则按顺序匹配，越靠前优先级越高
;==============================

; 广告拦截 —— 放最前，命中即拒绝
ruleset=拒绝,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AdvertisingLite/AdvertisingLite.list

; 业务分流
ruleset=🤖 AI,https://raw.githubusercontent.com/iHub-2020/reyan_OpenClash/refs/heads/main/AI.list
ruleset=💻 GitHub,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GitHub/GitHub.list
ruleset=🐳 Docker,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Docker/Docker.list
ruleset=✈️ Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list
ruleset=💬 WhatsApp,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Whatsapp/Whatsapp.list
ruleset=📹 Youtube,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list

; Google 专属规则集 —— 放在 境外 之前，确保 Google 优先命中此组
ruleset=🔍 Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list

ruleset=📺 IPTV,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/IPTV/IPTV.list
ruleset=🚀 代理,https://raw.githubusercontent.com/iHub-2020/reyan_OpenClash/refs/heads/main/Proxy.list
ruleset=🌍 境外,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Global/Global.list
ruleset=🏠 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Direct/Direct.list
ruleset=🏠 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/China/China.list
ruleset=🏠 国内,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaIPs/ChinaIPs.list
ruleset=🏠 国内,[]GEOIP,CN
ruleset=➡️ 其他,[]MATCH

;==============================
