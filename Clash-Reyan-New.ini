;--- CF官方优选节点组（v4 新增）---
; 正则核心逻辑：
;   (10|[1-9])(?!\d)  →  精确匹配 1~10，(?!\d) 防止 "1" 误匹配 "10"、"11" 等
;   (20|1[1-9])(?!\d) →  精确匹配 11~20，以此类推
; CF节点已从 其他 组排除，但保留在 所有-手动/所有-自动 中

; CF-1：CF官方优选1~10
custom_proxy_group=CF-1-故转`select`[]CF-1-手动`[]CF-1-自动
custom_proxy_group=CF-1-手动`select`(?i)CF官方优选(10|[1-9])(?!\d)
custom_proxy_group=CF-1-自动`url-test`(?i)CF官方优选(10|[1-9])(?!\d)`http://www.gstatic.com/generate_204`300,,50

; CF-2：CF官方优选11~20
custom_proxy_group=CF-2-故转`select`[]CF-2-手动`[]CF-2-自动
custom_proxy_group=CF-2-手动`select`(?i)CF官方优选(20|1[1-9])(?!\d)
custom_proxy_group=CF-2-自动`url-test`(?i)CF官方优选(20|1[1-9])(?!\d)`http://www.gstatic.com/generate_204`300,,50

; CF-3：CF官方优选21~30
custom_proxy_group=CF-3-故转`select`[]CF-3-手动`[]CF-3-自动
custom_proxy_group=CF-3-手动`select`(?i)CF官方优选(30|2[1-9])(?!\d)
custom_proxy_group=CF-3-自动`url-test`(?i)CF官方优选(30|2[1-9])(?!\d)`http://www.gstatic.com/generate_204`300,,50

; CF-4：CF官方优选31~40
