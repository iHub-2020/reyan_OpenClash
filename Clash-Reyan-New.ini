; IPTV 默认直连（国内流媒体，不应走代理）
custom_proxy_group=📺 IPTV`select`[]直连`[]所有-自动`[]所有-手动`[]香港-故转`[]台湾-故转`[]日本-故转`[]新加坡-故转`[]美国-故转`[]自建美国-故转`[]自建日本1-故转`[]自建日本2-故转`[]其他-故转`[]拒绝

