custom_proxy_group=CF-4-手动`select`(?i)CF官方优选(40|3[1-9])(?!\d)
custom_proxy_group=CF-4-自动`url-test`(?i)CF官方优选(40|3[1-9])(?!\d)`http://www.gstatic.com/generate_204`300,,50

; CF-5：CF官方优选41~50
