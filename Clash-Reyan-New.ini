;--- 总策略组（v5：移除"直连"排除，使HX Hysteria2节点正常入组）---
custom_proxy_group=所有-手动`select`(?i)^((?!(拒绝|racknerd|oracle)).)*$
custom_proxy_group=所有-自动`url-test`(?i)^((?!(拒绝|racknerd|oracle)).)*$`http://www.gstatic.com/generate_204`300,,50

;--- 香港节点组 ---
custom_proxy_group=香港-故转`select`[]香港-手动`[]香港-自动
; [v5 BUG FIX] 移除 (?!.*直连)，使"香港直连1/2"等节点可匹配进入本组
custom_proxy_group=香港-手动`select`(?i)(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$
custom_proxy_group=香港-自动`url-test`(?i)(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$`http://www.gstatic.com/generate_204`300,,50

