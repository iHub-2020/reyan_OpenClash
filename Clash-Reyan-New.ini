custom_proxy_group=台湾-手动`select`(?i)(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$
custom_proxy_group=台湾-自动`url-test`(?i)(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$`http://www.gstatic.com/generate_204`300,,50

